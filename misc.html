    <script>
        function toggleShow(elem) {
            var content = elem.nextElementSibling;
            var isDisplayed = content.style.display === 'block';

            // 切换内容的显示状态
            content.style.display = isDisplayed ? 'none' : 'block';

            // 切换 'Show more' 和 'Show less' 文本
            var text = isDisplayed ? 'Show earlier work' : 'Show less';
            elem.textContent = text + ' '; // 添加空格以分隔文本和箭头

            // 切换箭头图标
            var arrowText = isDisplayed ? '&#9660;' : '&#9650;'; // 箭头向下或向上
            elem.innerHTML = text + arrowText; // 使用 innerHTML 来插入箭头图标
        }
    </script>
